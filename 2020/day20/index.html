<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <script type="text/javascript" src="https://zeptojs.com/zepto.min.js"></script>
    <title>AOC 2020 - Day 20</title>
    <style type="text/css">
        #root {
            background-color: #dcf5fd;
            position:absolute;
            width: 576px;
            height: 576px;
            zoom:2;
        }
        .p {
            position:absolute;
            height: 6px;
            width: 6px;
            font-size: 6px;
        }
        .t1 {    
            color: #70bcda;
            margin-top: -2px;
        }
        .t1:after {
            content: '🌊';
        }
        .t2, .t3, .t4, .t5, .t6 {
            background-color: #6B8E23;
            z-index:10;
            color:white;
            font-family: cursive;
        }
        .t2 {
            border-bottom-left-radius: 10px;
            border-top-right-radius: 10px;
        }
        .t3 {
            border-bottom-right-radius: 10px;
            border-top-left-radius: 10px;
        }
        .t4 {
            border-bottom-left-radius: 5px;
            border-top-right-radius: 10px;
        }
        .t4:after {
            content: 'o';
            margin-left: 3px;
            font-weight: bold;
        }
        .t5 {
            border-bottom-left-radius: 10px;
            border-top-right-radius: 0px;
        }
        .t6 {
            border-bottom-right-radius: 10px;
            border-top-right-radius: 5px;
        }
        .t6:after {
            content: 'vvv';
            margin-left: -3px;
        }
        .p.animated {
            -webkit-animation: ease-in-out infinite alternate;
            -webkit-animation-name: run;
            -webkit-animation-duration: 2s;
        }
        @-webkit-keyframes run {
            0% {margin-left: 0}
            50% {margin-left: 5px}
            100% {margin-left: 0}
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script src="input.js"></script>
    <script src="TileSet.js"></script>
    <script src="script.js"></script>
</body>
</html>
