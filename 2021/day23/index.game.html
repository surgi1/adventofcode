<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Troopahs The Game</title>

    <link rel="stylesheet" type="text/css" href="./styles.css" />
</head>
<body>
    <div id="nav">
        <!--<img class="titleimg" src="https://fontmeme.com/temporary/bc098e7173dd074d55c021f52b238182.png"/><br/>-->
        <div class="title">
            <div class="left" style="font-size:24px;">
                Map: <span id="maps"></span>
            </div>
            <strike>AMPHIPOD</strike> TROOPAHS
            <div class="right" style="font-size:24px;"> &nbsp;
            </div>
        </div>
        <div class="left">
            [<span id="easymode" class="selected" href="#">easy</span>·<span id="hardmode" class="link" href="#">hard</span>]
        </div>
            Current cost: <span class="score" id="score">0</span>
        <div class="right">
            Best effort: <span class="score" id="topscore">N/A</span>
        </div>
    </div>
    <canvas id="canvas" width="1092" height="756"></canvas>
    <div id="footer">
        <span class="left">
            <a id="restart" href="#">[Restart]</a>
            <a id="openloadbox" href="#">[Load your input]</a>
        </span>
        <span class="right small">
            Icon by <a href="https://www.behance.net/Bryan_Chen" target="_blank"> Bryan Chen</a> | Source is <a href="https://github.com/surgi1/adventofcode/tree/main/2021/day23" target="_blank">here</a>
        </span>
    </div>
    <div id="message" class="message out">
        <div class="inner">
            <div class="victory" id="victory">GOOD JOB!</div>
            Final cost: <span class="score" id="mbscore">0</span><br/>
            <span id="candobetter">Maybe you can do better?</span><br />
            <div class="messagebuttons">
                <a id="tryagain" href="#">[Try again]</a>
                <a id="nextmap" href="#">[Next map]</a>
            </div>
        </div>
    </div>
    <div id="loadbox" class="message out">
        <div class="inner">
            Load your own input!
            <textarea onclick="this.select()" id="custom">paste here</textarea>
            <div>
                <a id="load" href="#">[Load]</a>
                <a id="closeloadbox" href="#">[Close]</a>
            </div>
        </div>
    </div>
    <script src="input.js"></script>
    <script src="script.game.js"></script>
</body>
</html>
