<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <script type="text/javascript" src="https://zeptojs.com/zepto.min.js"></script>
    <title>AOC 2019</title>
    <style type="text/css">
        html {
            font-family: Calibri;
        }
        #root {
            width: 600px;
            float: left;
        }
        input, #send {
            float: left;
            margin-right:4px;
            margin-top:0px;
            display:none;
        }
        .output {
            margin:10px 10px 10px 10px;
            padding:10px 20px 10px 20px;
            background-color:#eee;
            border: 1px solid lightslategray;
            border-radius:10px;
        }
        .output h3 {
            padding:0;
            margin:0;
        }
        .controls {
            margin-left:10px;
        }
        button {
            font-size:14px;
            margin:4px;
            border: 1px solid lightslategray;
            border-radius:4px;
            padding-left:14px;
            padding-right:14px;
            padding-top:7px;
            padding-bottom:7px;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <div class="controls">
        <table><tr><td></td><td><button data-action="direct" id="north">N</button></td><td></td></tr><tr><td><button data-action="direct" id="east">E</button></td><td><button data-action="direct" id="south">S</button></td><td><button data-action="direct" id="west">W</button></td></tr></table>
        <input type="text" id="command"></input>
        <button id="send">SEND</button>
        <button data-action="direct" id="inv">Inventory</button>
        <button id="export">Export path</button>
    </div>
    <script src="input.js"></script>
    <script src="Computer.js"></script>
    <script src="script.js"></script>
</body>
</html>
